name: Lint & Format Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    
    - name: Lint with ruff
      run: |
        ruff check core/ services/ streamlit_app/ scripts/ --output-format=github
      continue-on-error: true
    
    - name: Format check with ruff
      run: |
        ruff format core/ services/ streamlit_app/ scripts/ --check
      continue-on-error: true
    
    - name: Check for import issues
      run: |
        python -m py_compile core/**/*.py services/**/*.py streamlit_app/**/*.py scripts/**/*.py 2>/dev/null || true
      continue-on-error: true
    
    - name: Security checks (bandit)
      run: |
        pip install bandit
        bandit -r core/ services/ --exit-code 0
      continue-on-error: true

  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy types-all
        pip install -r requirements.txt -r requirements-dev.txt
    
    - name: Type check with mypy
      run: |
        mypy core/ services/ --ignore-missing-imports --no-error-summary || true
      continue-on-error: true
