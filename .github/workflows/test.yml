name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─── Legacy Streamlit tests ──────────────────────────────────────────────
  legacy-tests:
    name: Legacy Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=core --cov=services --cov=streamlit_app --cov=scripts \
          --cov-report=xml --cov-report=term --cov-fail-under=50

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: legacy
        name: legacy-coverage
        fail_ci_if_error: false

  # ─── SGIND v2 Backend tests ──────────────────────────────────────────────
  sgind-v2-backend:
    name: SGIND v2 — Backend FastAPI
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-sgind-v2-pip-${{ hashFiles('sgind-v2/backend/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-sgind-v2-pip-

    - name: Install backend dependencies
      working-directory: sgind-v2/backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Fase 4 tests (OM CRUD + filtros)
      working-directory: sgind-v2/backend
      env:
        SGIND_DATA_PATH: ../../data
        PYTHONPATH: .
      run: |
        python -m pytest tests/test_fase4_completions.py -v --tb=short -q

    - name: Run Fase 6 tests (API contracts + semáforo)
      working-directory: sgind-v2/backend
      env:
        SGIND_DATA_PATH: ../../data
        PYTHONPATH: .
      run: |
        python -m pytest tests/test_fase6_contracts.py -v --tb=short -q

    - name: Run Fase 7 tests (auth + RBAC)
      working-directory: sgind-v2/backend
      env:
        SGIND_DATA_PATH: ../../data
        PYTHONPATH: .
      run: |
        python -m pytest tests/test_fase7_auth.py -v --tb=short -q

    - name: Run Fase 8 tests (migración de datos)
      working-directory: sgind-v2/backend
      env:
        SGIND_DATA_PATH: ../../data
        PYTHONPATH: .
      run: |
        python -m pytest tests/test_fase8_migration.py -v --tb=short -q

    - name: Run Fase 9 tests (reportes PDF)
      working-directory: sgind-v2/backend
      env:
        SGIND_DATA_PATH: ../../data
        PYTHONPATH: .
      run: |
        python -m pytest tests/test_fase9_pdf.py -v --tb=short -q

    - name: Run Fase 10 tests (staging CI/CD)
      working-directory: sgind-v2/backend
      env:
        PYTHONPATH: .
      run: |
        pip install pyyaml -q
        python -m pytest tests/test_fase10_staging.py -v --tb=short -q

    - name: Lint backend with ruff
      working-directory: sgind-v2/backend
      run: |
        pip install ruff
        python -m ruff check app/ tests/

  # ─── SGIND v2 Frontend build ─────────────────────────────────────────────
  sgind-v2-frontend-build:
    name: SGIND v2 — Frontend Next.js build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: sgind-v2/frontend/package-lock.json

    - name: Install dependencies
      working-directory: sgind-v2/frontend
      run: npm ci

    - name: TypeScript check
      working-directory: sgind-v2/frontend
      run: npx tsc --noEmit

    - name: ESLint check
      working-directory: sgind-v2/frontend
      run: npm run lint
      continue-on-error: true

    - name: Build Next.js
      working-directory: sgind-v2/frontend
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
      run: npm run build

  # ─── SGIND v2 E2E Playwright ─────────────────────────────────────────────
  sgind-v2-e2e:
    name: SGIND v2 — E2E Playwright
    runs-on: ubuntu-latest
    # Solo ejecutar E2E en push a main o PR — no en develop para agilizar CI
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    needs: sgind-v2-frontend-build

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: sgind-v2/frontend/package-lock.json

    - name: Install dependencies
      working-directory: sgind-v2/frontend
      run: npm ci

    - name: Install Playwright browsers
      working-directory: sgind-v2/frontend
      run: npx playwright install chromium --with-deps

    - name: Build Next.js for E2E
      working-directory: sgind-v2/frontend
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
      run: npm run build

    - name: Run Playwright E2E tests
      working-directory: sgind-v2/frontend
      env:
        CI: true
        NEXT_PUBLIC_API_URL: http://localhost:8000
        PLAYWRIGHT_BASE_URL: http://localhost:3000
      run: npx playwright test --reporter=list

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: sgind-v2/frontend/playwright-report/
        retention-days: 7
