name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Render (Staging)
      run: |
        echo "Staging deployment trigger"
        # Render.com automatically deploys on push to develop branch
        # if connected via GitHub integration
    
    - name: Notify deployment
      if: always()
      run: |
        echo "Deployment to staging initiated"
        echo "Check Render.com dashboard for status"
    
    # Optional: Ping Render deploy hook
    - name: Trigger Render Deploy Hook
      if: github.event_name == 'push'
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }} || true
      continue-on-error: true

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Wait for deployment
      run: |
        echo "Waiting 30 seconds for deployment to propagate..."
        sleep 30
    
    - name: Health check
      run: |
        # Replace with actual staging URL
        STAGING_URL="${{ secrets.STAGING_URL }}"
        if [ -z "$STAGING_URL" ]; then
          echo "Staging URL not configured in secrets"
          exit 0
        fi
        
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" $STAGING_URL/healthz || echo "000")
        echo "Staging health check: $STATUS"
        
        if [ "$STATUS" -eq 200 ]; then
          echo "✅ Staging deployment successful"
        else
          echo "⚠️ Staging health check returned: $STATUS"
        fi
      continue-on-error: true
