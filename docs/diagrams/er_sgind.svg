<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .source { fill: #f3f4f6; stroke: #333; }
    .title { font: bold 14px sans-serif; }
    .label { font: 12px sans-serif; }
    .arrow { stroke: #333; stroke-width: 1.2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Fuentes -->
  <g id="fuentes">
    <rect x="20" y="20" width="340" height="110" class="source"/>
    <text x="30" y="40" class="title">Resultados Consolidados.xlsx</text>
    <text x="30" y="60" class="label">Hojas:</text>
    <text x="50" y="78" class="label">• Consolidado Semestral</text>
    <text x="50" y="96" class="label">• Catalogo Indicadores</text>
    <text x="50" y="114" class="label">• Consolidado Cierres</text>

    <rect x="20" y="140" width="300" height="60" class="source"/>
    <text x="30" y="160" class="label">Consolidado Historico.xlsx</text>
    <text x="30" y="178" class="label">Hojas: Consolidado Historico</text>

    <rect x="20" y="220" width="340" height="60" class="source"/>
    <text x="30" y="240" class="label">API Kawak / Consolidado_API_Kawak.xlsx</text>
    <text x="30" y="258" class="label">Tablas: Consolidado_API_Kawak</text>

    <rect x="20" y="300" width="300" height="60" class="source"/>
    <text x="30" y="320" class="label">Indicadores por CMI.xlsx</text>
    <text x="30" y="338" class="label">Hojas: Indicadores CMI</text>

    <rect x="20" y="380" width="300" height="60" class="source"/>
    <text x="30" y="400" class="label">Catalogo Indicadores.xlsx</text>
    <text x="30" y="418" class="label">Hojas: Catalogo Indicadores</text>

    <rect x="20" y="460" width="300" height="60" class="source"/>
    <text x="30" y="480" class="label">Ficha_Tecnica.xlsx</text>
    <text x="30" y="498" class="label">Hojas: Ficha_Tecnica</text>

    <rect x="20" y="540" width="300" height="60" class="source"/>
    <text x="30" y="560" class="label">OM.xlsx / OM.xls</text>
    <text x="30" y="578" class="label">Hojas: OM, OM_Historico</text>

    <rect x="20" y="620" width="300" height="60" class="source"/>
    <text x="30" y="640" class="label">Plan de accion/*.xlsx</text>
    <text x="30" y="658" class="label">Tablas: Avance, Acciones</text>

    <rect x="20" y="700" width="320" height="60" class="source"/>
    <text x="30" y="720" class="label">Subproceso-Proceso-Area.xlsx</text>
    <text x="30" y="738" class="label">Hojas: Proceso, Subproceso, Area</text>

    <rect x="20" y="780" width="320" height="60" class="source"/>
    <text x="30" y="800" class="label">Registro OM (SQLite / Supabase)</text>
    <text x="30" y="818" class="label">Tablas: registros_om</text>
  </g>

  <!-- Modelo -->
  <g id="modelo">
    <rect x="420" y="40" width="300" height="70" class="box"/>
    <text x="440" y="60" class="title">INDICADOR</text>
    <text x="440" y="80" class="label">PK: Id</text>

    <rect x="760" y="40" width="340" height="80" class="box"/>
    <text x="780" y="60" class="title">RESULTADO / INDICADOR_RESULTADO</text>
    <text x="780" y="80" class="label">PK: (Id, Fecha) | FK: Id_Indicador</text>

    <rect x="420" y="150" width="220" height="60" class="box"/>
    <text x="440" y="170" class="title">META</text>
    <text x="440" y="190" class="label">PK: (Id, Año)</text>

    <rect x="420" y="240" width="180" height="50" class="box"/>
    <text x="440" y="260" class="title">OBJETIVO</text>

    <rect x="420" y="310" width="160" height="50" class="box"/>
    <text x="440" y="330" class="title">LINEA</text>

    <rect x="420" y="390" width="200" height="60" class="box"/>
    <text x="440" y="410" class="title">PROCESO</text>

    <rect x="660" y="390" width="180" height="50" class="box"/>
    <text x="680" y="410" class="title">SUBPROCESO</text>

    <rect x="840" y="390" width="140" height="50" class="box"/>
    <text x="860" y="410" class="title">AREA</text>

    <rect x="760" y="160" width="160" height="60" class="box"/>
    <text x="780" y="180" class="title">OM</text>
    <text x="780" y="200" class="label">PK: Id_OM | FK: Id_Indicador</text>
  </g>

  <!-- Relaciones (flechas) -->
  <line x1="600" y1="110" x2="760" y2="110" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="660" y="100" class="label">1:N tiene resultados</text>

  <line x1="540" y1="210" x2="540" y2="160" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="480" y="190" class="label">1:N puede tener metas</text>

  <line x1="540" y1="240" x2="540" y2="290" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="460" y="260" class="label">contribuye a (N:1)</text>

  <line x1="540" y1="370" x2="540" y2="420" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="460" y="395" class="label">pertenece a (N:1)</text>

  <line x1="780" y1="220" x2="780" y2="360" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="740" y="300" class="label">FK referencia</text>

  <line x1="560" y1="430" x2="760" y2="430" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="640" y="420" class="label">1:N tiene OM</text>

  <!-- Conexiones Fuentes -> Entidades (líneas) -->
  <line x1="300" y1="50" x2="420" y2="50" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="340" y="40" class="label">provee: Indicador, Resultado, Meta</text>

  <line x1="300" y1="200" x2="420" y2="170" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="320" y="180" class="label">provee: Indicador, Objetivo</text>

  <line x1="300" y1="470" x2="460" y2="430" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="320" y="452" class="label">provee: Proceso/Subproceso/Area</text>

  <line x1="300" y1="360" x2="760" y2="200" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="480" y="300" class="label">provee: OM histórica / Avance acciones</text>

  <!-- Footer -->
  <text x="20" y="860" class="label">Generado: Modelo ER - SGIND</text>
</svg>