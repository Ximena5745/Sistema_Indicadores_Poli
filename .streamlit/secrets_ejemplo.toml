# =============================================================================
# Secrets para Streamlit Cloud - Autenticación Microsoft Entra ID
# =============================================================================
# Copia este contenido en la sección "Secrets" de Streamlit Cloud
# Ve a: https://share.streamlit.io → Your app → Settings → Secrets
#
# IMPORTANTE: NUNCA expongas client_secret en código ni logs.
# =============================================================================

# -----------------------------------------------------------------------------
# Configuración de Autenticación OIDC - MICROSOFT ENTRA ID
# -----------------------------------------------------------------------------
auth_provider = "microsoft"

# Client ID (Application ID) de Microsoft Entra ID
# Ve a: https://entra.microsoft.com → Registros de aplicaciones → Tu app
client_id = "TU_APPLICATION_ID_AQUI"

# Client Secret - NUNCA en código, SOLO en Streamlit Cloud Secrets
client_secret = "TU_CLIENT_SECRET_AQUI"

# Requerir verificación de email (recomendado: true)
require_email_verified = true

# -----------------------------------------------------------------------------
# Lista de correos autorizados (allowlist)
# -----------------------------------------------------------------------------
# IMPORTANTE: Usa MINÚSCULAS - todos los correos usan dominio @poligran.edu.co
allowed_emails = [
    "admin@poligran.edu.co",
    "director@poligran.edu.co",
    "juan.perez@poligran.edu.co",
    # Agrega más correos autorizados aquí
]

# -----------------------------------------------------------------------------
# Base de datos (mantener si ya tienes configuración)
# -----------------------------------------------------------------------------
# DATABASE_URL = "postgresql://postgres:[TU-CONTRASEÑA]@db.xxx.supabase.co:5432/postgres"