[browser]
gatherUsageStats = false

[theme]
# ── Paleta institucional · Sistema de Indicadores · Politécnico Grancolombiano ──
base = "light"
primaryColor = "#0E7490"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f7f9fe"
textColor = "#0f2137"
font = "Segoe UI"

[server]
headless = true
enableCORS = false

[global]
hideStreamlitLogo = true

# =============================================================================
# Autenticación OIDC - Streamlit 1.35+
# =============================================================================
# La autenticación se configura en los Secrets de Streamlit Cloud
# No es necesario configurar nada aquí para st.login() básico
# =============================================================================
