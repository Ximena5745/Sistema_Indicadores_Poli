services:
  db:
    image: postgres:16-alpine
    container_name: sgind-v2-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgind_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sgind}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./database/migrations/002_seed_ai_prompts.sql:/docker-entrypoint-initdb.d/002_seed_ai_prompts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgind} -d ${POSTGRES_DB:-sgind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgind-v2-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sgind}:${POSTGRES_PASSWORD:-sgind_dev_password}@db:5432/${POSTGRES_DB:-sgind}
      SGIND_DATA_PATH: /data
    ports:
      - "8000:8000"
    volumes:
      # Ruta relativa al compose file → Sistema_Indicadores_Poli/data (no usar SGIND_DATA_PATH del .env)
      - ../data:/data:ro
      - ./backend/app:/app/app:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_ENABLE_DEV_LOGIN: "true"
    container_name: sgind-v2-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_ENABLE_DEV_LOGIN: "true"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
