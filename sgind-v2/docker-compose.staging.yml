services:
  db:
    image: postgres:16-alpine
    container_name: sgind-v2-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-sgind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./database/migrations/002_seed_ai_prompts.sql:/docker-entrypoint-initdb.d/002_seed_ai_prompts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgind} -d ${POSTGRES_DB:-sgind}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # En staging NO exponer puerto PG al exterior
    # ports: deshabilitadas intencionalmente

  backend:
    image: ghcr.io/ximena5745/sgind-v2-backend:latest
    container_name: sgind-v2-backend
    restart: always
    env_file:
      - .env.staging
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sgind}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sgind}
      ENVIRONMENT: staging
      SGIND_DATA_PATH: /data
    ports:
      - "8000:8000"
    volumes:
      - ${SGIND_DATA_HOST_PATH:?SGIND_DATA_HOST_PATH required}:/data:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ghcr.io/ximena5745/sgind-v2-frontend:latest
    container_name: sgind-v2-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_ENABLE_DEV_LOGIN: "false"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: sgind-v2-staging-db
