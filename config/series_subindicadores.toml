# ════════════════════════════════════════════════════════════════════
# CRONOGRAMA DE PROYECTOS ESTRATÉGICOS
# ════════════════════════════════════════════════════════════════════
#
# Lógica: la meta/cumplimiento de cada proyecto se extrae de la SERIE
# del indicador padre que varía por año de vigencia:
#   2024 → ID 441 (Cumplimiento a cronograma de proyectos 2024)
#   2025 → ID 509 (Cumplimiento a cronograma de proyectos 2025)
#   2026 → ID 603 (Cumplimiento a cronograma de proyectos 2026)
#
# Los indicadores de proyecto NO tienen filas propias en el catálogo
# Kawak; sus valores vienen exclusivamente de las series del padre.

[cronograma_proyectos]

[cronograma_proyectos.padres]
# año (string) → ID del indicador padre en la API
"2024" = 441
"2025" = 509
"2026" = 603

[cronograma_proyectos.series]
# Formato: "nombre de la serie en API" = "ID_indicador_proyecto"
# La comparación es case-insensitive y sin tildes (robustez ante encoding).
# Una misma serie puede tener nombre distinto en distintos años;
# se añade una entrada por cada variante de nombre.
#
# Códigos PRY-N: los proyectos de este grupo no tienen fila propia en el
# catálogo Kawak (ver cabecera de sección). Se recodificaron desde IDs
# numéricos sueltos a códigos secuenciales estables el 2026-07-12.
# Mapeo histórico → código nuevo:
#   11→PRY-12  12→PRY-13  901→PRY-17  904→PRY-20  906→PRY-22  909→PRY-25
#   910→PRY-26 911→PRY-27 912→PRY-28  913→PRY-29  914→PRY-30  915→PRY-31
#   916→PRY-32 918→PRY-34 919→PRY-35  920→PRY-36  922→PRY-38  924→PRY-40
#   926→PRY-42 927→PRY-43

