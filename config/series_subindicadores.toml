# config/series_subindicadores.toml
# Mapeo de sub-series de indicadores → sub-indicadores del consolidado.
#
# Formato: "ID_padre.sufijo" = "nombre exacto de la serie en el JSON del API"
#
# La coincidencia se hace case-insensitive y normalizando espacios múltiples,
# por lo que variaciones menores de escritura en el API no rompen el mapeo.
#
# Para añadir nuevos sub-indicadores: agregar línea bajo la sección
# correspondiente y NO modificar código Python.

