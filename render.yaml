services:
  - type: web
    name: dashboard-indicadores
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/start_streamlit.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"

  - type: web
    name: sgind-v2-backend
    runtime: docker
    plan: free
    dockerfilePath: ./sgind-v2/backend/Dockerfile.render
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ORIGINS
        sync: false
      - key: SGIND_DATA_PATH
        value: /app/data
      - key: EXCEL_CACHE_TTL_SECONDS
        value: "300"
      - key: ALLOWED_EMAILS
        sync: false
